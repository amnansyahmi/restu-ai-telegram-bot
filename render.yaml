services:
  - type: web
    name: restu-telegram-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: AI_NONYMAUZ_CLOUD_URL
        sync: false
      - key: AI_NONYMAUZ_CLOUD_API_KEY
        sync: false
      - key: AI_NONYMAUZ_CLOUD_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NODE_VERSION
        value: 22
