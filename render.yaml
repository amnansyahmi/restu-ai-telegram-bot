services:
  - type: web
    name: restu-telegram-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: NODE_VERSION
        value: 22
